<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada | Campus Camila Hiruela</title>
  <meta name="description" content="La página que buscas no existe o ya no está disponible.">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#032652">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Lato", sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        url("img/topography.svg"),
        linear-gradient(to right, rgba(3, 38, 82, 0.96), #1d8fd6);
      background-repeat: repeat, no-repeat;
      background-size: auto, cover;
      background-attachment: scroll, fixed;
    }

    .pagina-404 {
      width: min(720px, 100%);
      padding: 36px 28px;
      text-align: center;
      background: rgba(3, 38, 82, 0.42);
      border: 2px solid rgba(255, 255, 255, 0.24);
      border-radius: 22px;
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 48px rgba(2, 20, 44, 0.22);
    }

    .pagina-404 img {
      width: 120px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    .etiqueta-error {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    h1 {
      margin: 0 0 16px;
      font-family: "Anton", sans-serif;
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 400;
      line-height: 1;
      text-transform: uppercase;
      -webkit-text-stroke: 1px black;
    }

    p {
      max-width: 560px;
      margin: 0 auto 14px;
      font-size: 20px;
      line-height: 1.5;
    }

    .texto-secundario {
      margin-bottom: 28px;
      font-size: 17px;
      opacity: 0.92;
    }

    .boton-volver {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 10px;
      border: 2px solid white;
      background-color: rgb(0, 84, 166);
      color: white;
      font-family: "Anton", sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .boton-volver:hover {
      background-color: white;
      color: rgb(0, 84, 166);
      border-color: rgb(0, 84, 166);
    }

    @media (max-width: 767px) {
      body {
        padding: 18px;
      }

      .pagina-404 {
        padding: 28px 20px;
        border-radius: 18px;
      }

      .pagina-404 img {
        width: 92px;
        margin-bottom: 16px;
      }

      p {
        font-size: 17px;
      }

      .texto-secundario {
        font-size: 15px;
        margin-bottom: 24px;
      }

      .boton-volver {
        font-size: 18px;
        padding: 12px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="pagina-404">
    <img src="img/logo-sin-fondo-sin-letra.PNG" alt="Logo del Campus Camila Hiruela">
    <p class="etiqueta-error">Error 404</p>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ya no está disponible.</p>
    <p class="texto-secundario">Puedes volver al inicio para seguir navegando por el Campus Camila Hiruela.</p>
    <a href="index.html" class="boton-volver">Volver al inicio</a>
  </main>
</body>
</html>

          <div class="contador-campus">

                <span id="dias">00</span>

              <div class="item-contador">
                <span id="horas">00</span>

              </div>

              <div class="item-contador">
                <span id="minutos">00</span>

              </div>

        </a>

        <a href="https://maps.app.goo.gl/W2k1eMbJ82bi6H7UA?g_st=iw" target="_blank" rel="noopener noreferrer" class="item-contacto-campus">

        <img src="img/municipalidad-jujuy.PNG" alt="Municipalidad de Jujuy">
